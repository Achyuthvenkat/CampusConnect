name: campus_connect
description: College Freelancing Marketplace
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.9

  # State Management
  provider: ^6.1.1

  # Image/Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  flutter_rating_bar: ^4.0.1
  timeago: ^3.6.0
  intl: ^0.19.0

  # Utils
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
